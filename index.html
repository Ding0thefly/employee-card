<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Employee QR Profile</title>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo-wrap">
        <img src="Company_Logo.png" alt="Company Logo" />
      </div>
      <div class="name">Jennifer Guingab Reyes</div>
      <div class="job-title">Administrative Head</div>
      <div class="company">Summa Water Management Inc.</div>
    </div>

    <div class="actions">
      <a href="tel:09612185575">Call</a>
      <a href="mailto:jrguingab@summawater.com">Email</a>
    </div>

    <div class="section">
      <div class="section-title">Employee Information</div>

      <div class="info-list">
        <div class="info-item">
          <div class="icon">📱</div>
          <div class="info-content">
            <div class="label">Mobile</div>
            <div class="value"><a href="tel:09612185575">09612185575</a></div>
          </div>
        </div>

        

        <div class="info-item">
          <div class="icon">✉️</div>
          <div class="info-content">
            <div class="label">Email</div>
            <div class="value"><a href="mailto:jrguingab@summawater.com">jrguingab@summawater.com</a></div>
          </div>
        </div>

        <div class="info-item">
          <div class="icon">🏢</div>
          <div class="info-content">
            <div class="label">Department</div>
            <div class="value">Admin</div>
          </div>
        </div>

      





      </div>
    </div>

         
   
</body>
</html>
